<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Aces Tagum College</title>

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

/* CONTAINER */
.register-container {
    width: 420px;
    padding: 50px 40px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* LOGO */
.logo {
    width: 90px;
    margin-bottom: 10px;
}

/* TITLE */
h2 {
    margin-bottom: 25px;
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
    text-align: left;
}

.input-group label {
    font-size: 14px;
    color: #333;
}

.input-group input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
.register-btn {
    width: 100%;
    padding: 12px;
    background: #c40000;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

.register-btn:hover {
    background: #a30000;
}

/* LINKS */
.extra {
    margin-top: 20px;
    font-size: 13px;
}

.extra a {
    color: #c40000;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="register-container">

    <img src="image/aces_logo_1-removebg-preview.png" class="logo">

    <h2>Register</h2>

    <form>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="register-btn">Register</button>
    </form>

    <div class="extra">
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

</div>

</body>
</html>
