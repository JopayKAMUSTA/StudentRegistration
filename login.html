<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Aces Tagum College</title>

<style>
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5; 
    font-family: Arial, sans-serif;
}


.login-container {
    width: 400px;
    padding: 60px 40px; /* taller box */
    border-radius: 12px;

    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);

    text-align: center;
}

.login-container h2 {
    margin-bottom: 30px;
    color: black;
}


.input-group {
    margin-bottom: 20px;
    text-align: left;
}

.input-group label {
    font-size: 14px;
    color: #333;
}

.input-group input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;

    border: 1px solid #ccc;
    outline: none;

    color: black;
}

.input-group input::placeholder {
    color: #999;
}


.login-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;

    background: #c40000;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.login-btn:hover {
    background: #a30000;
}


.extra {
    margin-top: 25px;
    font-size: 13px;
}

.extra a {
    color: #c40000;
    text-decoration: none;
}

.login-container {
    width: 400px;
    padding: 60px 40px;
    border-radius: 12px;

    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);

    text-align: center;
}


.logo {
    width: 90px;
    margin-bottom: 10px;
}


.login-container h2 {
    margin-bottom: 25px;
    color: black;
}
</style>

</head>
<body>

  <div class="login-container">

    <img src="image/aces_logo_1-removebg-preview.png" alt="" class="logo">

    <h2>Login</h2>

    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra">
        <p><a href="#">Forgot Password?</a></p>
        <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

</div>

</body>
</html>
