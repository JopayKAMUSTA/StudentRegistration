<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Subject</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    
    <div class="sidebar">
    <img src="../image/aces_logo_1-removebg-preview.png" class="logo">
    <h2>School Admin</h2>

        <ul>
      <a href="adminDashboard.html">  <li> <i class="fa-solid fa-house"></i>Dashboard</li></a>
        <a href="adminStudent.html"><li> <i class="fa-solid fa-users"></i> Students</li></a>
       <a href="adminSubject.html"> <li class="active"> <i class="fa-solid fa-book-open"></i> Subjects</li></a>
        <a href="adminAttendance.html"> <li> <i class="fa-regular fa-calendar"></i>Attendance</li></a>
      <a href="adminGrades.html">   <li> <i class="fa-solid fa-star"></i> Grades</li></a>
        <a href="#"> <li> <i class="fa-solid fa-gear"></i>Settings</li></a>
    </ul>
</div>


<div class="main">

      <div class="header">
            
            <div>
                <h1>Subjects</h1>
                <div class="breadcrumb">
                    <span>Home</span>
                    <span>/</span>
                    <span>Subjects</span>
                </div>
            </div>

                <div class="header-right">
                    <i class="fa-solid fa-bell notification"></i>
                </div>

                <div class="profile">
                    <img src="../image/prof.jpeg" alt="">
                    <span>Admin</span>
                    <i class="fa-solid fa-angle-down" style="color: rgb(0, 0, 0);"></i>
                </div>
            </div>


    <div class="form-section">
        <h2>Add Subject</h2>

        <div class="form-grid">
            <input type="text" placeholder="Subject Code">
            <input type="text" placeholder="Subject Name">

            <select name="" id="">
                <option>Course</option>
                <option>BSIT</option>
                <option>BSBA</option>
            </select>

            <select name="" id="">
                <option>Year Level</option>
                <option>1st Year</option>
                <option>2nd Year</option>
            </select>

            <input type="number" placeholder="Units">

            <select name="" id="">
                <option>Status</option>
                <option>Active</option>
                <option>Inactive</option>  
            </select>
        </div>

        <button class="save-btn">
                 <i class="fa-solid fa-floppy-disk"></i> Save Subject
        </button>

    </div>

</div>

</body>
</html>
